name: 🤖 Auto-Rescue Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # Nightly 2am UTC
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated repos to scan (leave blank for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — preview extractions without opening PR'
        required: false
        type: boolean
        default: false

jobs:
  auto-rescue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🧠 Checkout HYPER-SKILLs vault
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests PyYAML

      - name: 🔍 Extract skills from source repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPOS: ${{ github.event.inputs.repos || 'welshDog/HyperCode-V2.4,welshDog/HyperAgent-SDK,welshDog/BROski-Obsidian-Brain-for-HyperFocus-z0ne' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/extract_skills.py

      - name: 📋 Update vault-index.md
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/update_vault_index.py

      - name: 🔎 Check for new skills
        id: check_changes
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new skills found this run."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New skills detected! Opening PR..."
            git diff --stat
          fi

      - name: 🌿 Create rescue branch
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          BRANCH="auto-rescue/$(date +%Y-%m-%d-%H%M)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git config user.name "BROski Auto-Rescue Bot"
          git config user.email "bot@hyperfocuszone.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "🤖 auto-rescue: extracted new skills $(date +%Y-%m-%d)"
          git push origin "$BRANCH"

      - name: 🚀 Open Pull Request
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "🤖 Auto-Rescue: New skills extracted $(date +%Y-%m-%d)" \
            --body "## 🧠 Auto-Rescue Pipeline\n\nNew skills automatically extracted from source repos.\n\n**Repos scanned:** ${{ env.TARGET_REPOS }}\n\n**Review the skill files, then merge to add them to the vault.**\n\n> Generated by Auto-Rescue Pipeline 🐕⚡" \
            --head "$BRANCH" \
            --base main \
            --label "auto-rescue"

      - name: 📊 Summary
        run: |
          echo "## 🤖 Auto-Rescue Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Repos scanned: ${{ env.TARGET_REPOS || 'HyperCode-V2.4, HyperAgent-SDK, BROski-Obsidian-Brain' }}" >> $GITHUB_STEP_SUMMARY
          echo "- New skills found: ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
